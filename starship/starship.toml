# Starship prompt - minimal / sharp / works everywhere
add_newline = false

format = """
$username$hostname $directory$git_branch$git_status$cmd_duration
$character """

scan_timeout = 10

# Username
[username]
show_always = true
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style)"
disabled = false

# Hostname
[hostname]
ssh_only = false
style = "bold blue"
format = "[@$hostname]($style) "
disabled = false

# Current directory
[directory]
style = "bold cyan"
truncation_length = 4
truncation_symbol = ".../"
read_only = "[ro]"
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "
disabled = false

# Git branch
[git_branch]
symbol = ""
style = "bold purple"
format = "[git:$branch]($style) "

# Git status (changes, ahead/behind etc)
[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style)) "

# Command duration
[cmd_duration]
min_time = 500
style = "bold yellow"
format = "[took $duration]($style) "

# Prompt character
[character]
success_symbol = "[>](bold green)"
error_symbol = "[x](bold red)"
vicmd_symbol = "[<](bold green)"
format = "$symbol "
disabled = false
