# Minimal, modern Starship prompt with no Nerd Font dependency.
# Uses plain ASCII symbols so it renders cleanly on locked-down work machines.

add_newline = true
scan_timeout = 10
command_timeout = 1000

format = """
$directory$git_branch$git_status$fill$cmd_duration
$character """

[fill]
symbol = " "

[directory]
style = "bold #7aa2f7"
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 1
read_only = " [locked]"
read_only_style = "dimmed red"
format = "[$path]($style)[$read_only]($read_only_style)"

[git_branch]
symbol = " on "
style = "#a78bfa"
format = "[$symbol$branch]($style)"
only_attached = false

[git_status]
style = "#f6c177"
format = " [($all_status$ahead_behind)]($style)"
conflicted = "="
ahead = ">"
behind = "<"
diverged = "<>"
up_to_date = ""
untracked = "new "
stashed = "$"
modified = "edit "
staged = "stage "
renamed = "r"
deleted = "x"

[cmd_duration]
min_time = 800
style = "dimmed #9aa5ce"
format = "[took $duration]($style)"
show_milliseconds = false

[character]
success_symbol = "[->](bold #98c379)"
error_symbol = "[->](bold #e06c75)"
vicmd_symbol = "[<-](bold #56b6c2)"

[hostname]
disabled = true

[username]
disabled = true

[package]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[docker_context]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[terraform]
disabled = true
