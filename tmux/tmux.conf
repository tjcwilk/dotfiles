# Super
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g mouse on

# Window numbers from 1, not from 0, renumber if closed
set -g base-index 1
set-option -g renumber-windows on

# split panes using | and -
bind | split-window -h
bind - split-window -v

# vim pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Make tmux look good 8-)

# --- General ---
set -g status on
set -g status-position bottom
set -g status-interval 5

# --- Colours (clean + modern) ---
set -g status-style "bg=#1e1e2e fg=#cdd6f4"

# Left side (session name)
set -g status-left-length 40
set -g status-left "#[fg=#89b4fa,bold] #S "

# Right side (time + date)
set -g status-right-length 50
set -g status-right "#[fg=#a6e3a1] %H:%M #[fg=#bac2de] %d %b "

# --- Window tabs ---
set -g window-status-format " #[fg=#6c7086]#I:#W "
set -g window-status-current-format " #[fg=#1e1e2e,bg=#89b4fa,bold]#I:#W "

# --- Active pane border ---
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "fg=#89b4fa"

# --- Message styling ---
set -g message-style "bg=#1e1e2e fg=#f9e2af"
